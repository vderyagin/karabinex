---

name: CI

on:
  push:
    branches: ["master"]
    tags: ["v*"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Run linter
        run: bun run lint

  format:
    name: Format check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Check formatting
        run: bun run format-check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Run typecheck
        run: bun run typecheck

  test:
    name: Test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Run tests
        run: bun test

  build-web:
    name: Build web
    runs-on: ubuntu-24.04
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master'
    needs:
      - lint
      - typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Build web assets
        run: bun run build-web
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy-pages:
    name: Deploy Pages
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/master'
    needs:
      - build-web
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  build-cli:
    name: Build CLI
    runs-on: ubuntu-24.04
    needs:
      - lint
      - format
      - typecheck
      - test
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-bun
      - name: Build CLI bundle
        run: bun run build-cli
      - name: Package CLI bundle
        run: tar -czf dist/karabinex.tar.gz -C dist karabinex
      - uses: actions/upload-artifact@v4
        with:
          name: karabinex-cli
          path: dist/karabinex.tar.gz

  release:
    name: Release
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-cli
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: karabinex-cli
          path: dist
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            dist/karabinex.tar.gz \
            --repo "${GH_REPO}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
